<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คู่มือเอาชีวิตรอด: ฉบับไฟดับทั้งโลก</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%E2%9A%A0%EF%B8%8F</text></svg>">
<style>
  :root{
    --paper:#F5EFE3;
    --dark:#0D442B;
    --darker:#082C1C;
    --accent:#FB8B24;
    --danger:#A13D2B;
    --ink:#1B1B16;
    --paper-shadow: rgba(13,68,43,0.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,0.03), transparent 40%),
      repeating-linear-gradient(45deg, var(--darker) 0 2px, var(--dark) 2px 4px);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 12px;
    font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;
    color:var(--ink);
  }
  .zine{
    position:relative;
    width:100%;
    max-width:460px;
    min-height:640px;
    background:var(--paper);
    box-shadow: 0 20px 50px var(--paper-shadow), 0 0 0 1px rgba(0,0,0,0.05);
    background-image:
      radial-gradient(rgba(0,0,0,0.035) 1px, transparent 1px);
    background-size: 6px 6px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .torn-top, .torn-bottom{
    height:14px;
    width:100%;
    background:var(--paper);
    flex-shrink:0;
  }
  .torn-top{
    clip-path: polygon(0% 100%,3% 40%,7% 90%,11% 30%,15% 100%,19% 20%,23% 80%,27% 10%,31% 100%,35% 35%,39% 90%,43% 15%,47% 100%,51% 40%,55% 85%,59% 20%,63% 100%,67% 30%,71% 90%,75% 10%,79% 100%,83% 25%,87% 80%,91% 15%,95% 100%,100% 30%,100% 100%,0% 100%);
  }
  .torn-bottom{
    align-self:flex-end;
    clip-path: polygon(0% 0%,4% 70%,8% 10%,12% 80%,16% 20%,20% 90%,24% 15%,28% 75%,32% 5%,36% 85%,40% 25%,44% 95%,48% 10%,52% 70%,56% 20%,60% 90%,64% 5%,68% 80%,72% 15%,76% 95%,80% 25%,84% 70%,88% 10%,92% 85%,96% 20%,100% 90%,100% 0%,0% 0%);
  }
  .stage{
    position:relative;
    flex:1;
    padding:26px 24px 20px;
    display:flex;
    flex-direction:column;
    min-height:560px;
  }
  .eyebrow{
    font-family:'Courier New',ui-monospace,monospace;
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--dark);
    opacity:0.65;
    margin-bottom:6px;
  }
  h1,h2{
    font-family:'Courier New',ui-monospace,monospace;
    font-weight:800;
    letter-spacing:-0.5px;
    color:var(--dark);
    text-transform:uppercase;
    margin:0 0 12px;
  }
  h1{font-size:34px; line-height:1.05;}
  h2{font-size:24px; line-height:1.15;}
  p{font-size:15px; line-height:1.6; margin:0 0 14px;}
  .stamp{
    display:inline-block;
    border:3px double var(--danger);
    color:var(--danger);
    font-family:'Courier New',ui-monospace,monospace;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:1.5px;
    font-size:12px;
    padding:5px 10px;
    transform:rotate(-7deg);
    margin:6px 0 16px;
    background:rgba(161,61,43,0.06);
  }
  .divider{
    border:none;
    border-top:2px dashed rgba(13,68,43,0.3);
    margin:16px 0;
  }
  .btn{
    font-family:'Courier New',ui-monospace,monospace;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:1px;
    font-size:13px;
    background:var(--dark);
    color:var(--paper);
    border:none;
    padding:14px 18px;
    cursor:pointer;
    text-align:left;
    width:100%;
    margin-bottom:10px;
    transition: transform .08s ease, background .15s ease;
    position:relative;
  }
  .btn:hover{ background:var(--darker); transform:translateX(3px); }
  .btn:active{ transform:translateX(1px) scale(0.99); }
  .btn.big{
    background:var(--accent);
    color:var(--ink);
    text-align:center;
    font-size:14px;
  }
  .btn.big:hover{ background:#e07d1c; }
  .opt-note{
    display:block;
    font-family:-apple-system,'Segoe UI',sans-serif;
    font-weight:400;
    text-transform:none;
    letter-spacing:0;
    font-size:12px;
    opacity:0.75;
    margin-top:3px;
  }
  .footer-nav{
    margin-top:auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding-top:14px;
  }
  .navbtn{
    font-family:'Courier New',ui-monospace,monospace;
    font-size:12px;
    letter-spacing:1px;
    background:none;
    border:none;
    color:var(--dark);
    cursor:pointer;
    padding:6px 4px;
    opacity:0.85;
  }
  .navbtn:disabled{ opacity:0.25; cursor:default; }
  .pagecount{
    font-family:'Courier New',ui-monospace,monospace;
    font-size:11px;
    opacity:0.5;
  }
  .meter-wrap{
    margin-top:2px;
    margin-bottom:18px;
  }
  .meter-label{
    font-family:'Courier New',ui-monospace,monospace;
    font-size:10px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--dark);
    opacity:0.7;
    margin-bottom:4px;
    display:flex;
    justify-content:space-between;
  }
  .meter-shell{
    height:14px;
    width:100%;
    background:rgba(13,68,43,0.12);
    border:2px solid var(--dark);
    position:relative;
    overflow:hidden;
  }
  .meter-fill{
    height:100%;
    background:repeating-linear-gradient(90deg, var(--accent) 0 8px, #e07d1c 8px 10px);
    width:0%;
    transition:width .5s cubic-bezier(.4,1.6,.5,1);
  }
  .card{
    border:2px solid var(--dark);
    padding:14px 16px;
    margin-bottom:14px;
    background:rgba(255,255,255,0.35);
  }
  .card small{
    display:block;
    font-family:'Courier New',ui-monospace,monospace;
    font-size:10px;
    letter-spacing:1px;
    opacity:0.6;
    margin-top:6px;
  }
  .verdict-badge{
    font-family:'Courier New',ui-monospace,monospace;
    font-weight:800;
    text-transform:uppercase;
    font-size:15px;
    letter-spacing:1px;
    color:var(--paper);
    background:var(--dark);
    display:inline-block;
    padding:10px 14px;
    margin-bottom:12px;
    transform:rotate(-2deg);
  }
  .tag{
    display:inline-block;
    font-family:'Courier New',ui-monospace,monospace;
    font-size:11px;
    color:var(--dark);
    border:1.5px solid var(--dark);
    padding:3px 8px;
    margin:0 6px 6px 0;
    border-radius:20px;
  }
  .source{
    font-size:11px;
    opacity:0.6;
    line-height:1.5;
  }
  .qr-card{
    border:2px solid var(--dark);
    background:var(--paper);
    padding:14px;
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:14px;
  }
  .qr-card img{
    width:78px;
    height:78px;
    flex-shrink:0;
    background:#fff;
    padding:4px;
    border:1px solid rgba(13,68,43,0.25);
  }
  .qr-card .qr-text{
    flex:1;
  }
  .qr-card .qr-text p{
    margin:0 0 4px;
    font-size:13px;
    font-weight:600;
  }
  .qr-card .qr-text small{
    font-family:'Courier New',ui-monospace,monospace;
    font-size:10.5px;
    opacity:0.65;
    word-break:break-all;
  }
  .fade-in{ animation:fadein .35s ease both; }
  @keyframes fadein{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
  .zombie-corner{
    position:absolute;
    top:14px; right:16px;
    font-size:26px;
    opacity:0.85;
    transform:rotate(8deg);
  }
</style>
</head>
<body>

<div class="zine">
  <div class="torn-top"></div>
  <div class="stage" id="stage"></div>
  <div class="torn-bottom"></div>
</div>

<script>
const state = { page: 0, answers: {} };
const MAX_SCORE = 8;

function score(){
  return Object.values(state.answers).reduce((a,b)=>a+b,0);
}

function meterHTML(){
  const s = score();
  const pct = Math.round((s/MAX_SCORE)*100);
  return `
    <div class="meter-wrap">
      <div class="meter-label"><span>ระดับพร้อมรอด</span><span>${s}/${MAX_SCORE}</span></div>
      <div class="meter-shell"><div class="meter-fill" style="width:${pct}%"></div></div>
    </div>`;
}

function nav(showBack, showMeter){
  return `
    <div class="footer-nav">
      <button class="navbtn" onclick="goPrev()" ${state.page===0?'disabled':''}>&lt;&lt; ย้อนกลับ</button>
      <span class="pagecount">หน้า ${state.page+1}/8</span>
      <button class="navbtn" id="nextBtn" onclick="goNext()" ${state.page===7?'disabled':''}>ถัดไป &gt;&gt;</button>
    </div>`;
}

function answer(qkey, val, autoAdvance=true){
  state.answers[qkey] = val;
  render();
  if(autoAdvance){
    setTimeout(()=>{ state.page++; render(); }, 320);
  }
}

function goNext(){ if(state.page<7){ state.page++; render(); } }
function goPrev(){ if(state.page>0){ state.page--; render(); } }

function verdict(){
  const s = score();
  if(s>=6) return {
    title:"หัวหน้าแก๊งผู้รอด",
    sub:"SOLAR PREPPER LEGEND",
    body:"ซอมบี้มาก็เชิญ ไฟดับทั้งประเทศก็เชิญ บ้านคุณติดโซลาร์ได้จริง แถมคุ้มทุนไวด้วย เหลือแค่โทรหาช่างกับยื่นเรื่องขออนุญาตเท่านั้นเอง"
  };
  if(s>=3) return {
    title:"ผู้รอดชีวิตสมัครเล่น",
    sub:"ROOKIE SURVIVOR",
    body:"ยังพอมีลุ้น แต่มีจุดอ่อนอยู่บ้าง (เงินทุน หรือโครงสร้างหลังคา หรือเอกสาร) ต้องวางแผนก่อนไฟดับจริง แนะนำให้เริ่มจากเช็คงบและคุยกับช่างที่ไว้ใจได้"
  };
  return {
    title:"เหยื่อซอมบี้",
    sub:"ZOMBIE BAIT",
    body:"บ้านคุณยังไม่พร้อมติดเองตอนนี้ แต่ไม่ต้องท้อ ในโลกที่ไฟดับ คนที่รอดคือคนที่มีเพื่อนบ้านดี ๆ ที่ติดโซลาร์ไว้ก่อน แล้วไปลุ้นข้างบ้านแทน"
  };
}

const pages = [

// PAGE 0 - COVER
() => `
  <div class="zombie-corner">☢</div>
  <div class="eyebrow">Field Manual · Vol. 1</div>
  <div class="stamp">ห้ามเปิด จนกว่าไฟจะดับ</div>
  <h1>END OF<br>THE WORLD<br>SURVIVAL<br>GUIDE</h1>
  <p style="margin-top:6px; font-weight:600;">บทที่ 1: How to มี #ไฟแดด เป็นของตัวเอง</p>
  <p>โลกจะแตกไม่แตกไม่รู้ แต่ค่าไฟทะลุปรอทแน่นอน คู่มือฉบับนี้จะเช็คให้ว่า ถ้าวันหนึ่งสายส่งล่มจริง ๆ (หรือแค่บิลไฟแพงจนรู้สึกแบบนั้น) บ้านคุณจะรอดในฐานะ "เจ้าของไฟแดด" ได้มั้ย</p>
  <div class="divider"></div>
  <p style="font-size:12px; opacity:0.6;">จัดทำโดย JET in Thailand × The Good Chat</p>
  <div style="margin-top:auto;">
    <button class="btn big" onclick="goNext()">เปิดคู่มือ (ถ้ากล้า) →</button>
  </div>
`,

// PAGE 1 - PREMISE / BRIEFING
() => `
  <div class="eyebrow">สถานการณ์ล่าสุด</div>
  <h2>สายส่งล่ม<br>เมืองมืดสนิท</h2>
  <div class="card">
    <p style="margin:0;">03:14 น. ไฟฟ้าทั้งกริดดับพร้อมกัน ไม่มีใครรู้ว่าเป็นฝีมือซอมบี้ พายุสุริยะ หรือแค่โรงไฟฟ้าพังอีกแล้ว สิ่งเดียวที่แน่นอนคือ: บ้านไหนมีแดดเป็นของตัวเอง บ้านนั้นรอด</p>
    <small>REPORT #229 · CLASSIFIED</small>
  </div>
  <p>ก่อนจะไปถึงวันนั้น เรามีแบบทดสอบสั้น ๆ 4 ข้อ ให้เช็คว่าบ้านคุณ "พร้อมมีไฟแดดเป็นของตัวเอง" แค่ไหน คำถามอาจดูไร้สาระ แต่คำตอบอิงจากเงื่อนไขจริงของการติดโซลาร์รูฟท็อปในไทยล้วน ๆ</p>
  <p style="font-weight:600;">ตอบให้ครบ 4 ข้อ แล้วดูว่าคุณจะได้เป็น...</p>
  <p class="tag">เหยื่อซอมบี้</p><p class="tag" style="display:inline-block;">ผู้รอดชีวิตสมัครเล่น</p><p class="tag" style="display:inline-block;">หัวหน้าแก๊งผู้รอด</p>
  <div style="margin-top:auto;">
    <button class="btn big" onclick="goNext()">เริ่มทดสอบ →</button>
  </div>
`,

// PAGE 2 - Q1 SUNLIGHT / ROOF ORIENTATION
() => `
  <div class="eyebrow">คำถามที่ 1 / 4</div>
  ${meterHTML()}
  <h2>ซอมบี้กลัวแดด<br>บ้านคุณมีแดดมั้ย?</h2>
  <p>แผงโซลาร์ผลิตไฟจาก "ความเข้มของแสง" ไม่ใช่ความร้อน แถมทิศทาง-ความเอียงของหลังคายังมีผลกับปริมาณไฟที่ผลิตได้ด้วย</p>
  <button class="btn" onclick="answer('q1',2)">แดดจัดทั้งวัน หลังคาไม่มีอะไรบัง<span class="opt-note">โซลาร์เพเนลจะรักคุณมาก</span></button>
  <button class="btn" onclick="answer('q1',1)">มีแดดบ้าง แต่โดนตึกข้างบ้านบังครึ่งนึง<span class="opt-note">ยังพอไหว แต่ผลิตไฟได้ลดลง</span></button>
  <button class="btn" onclick="answer('q1',0)">อยู่ในซอกตึก แดดแทบไม่ถึง<span class="opt-note">ซอมบี้ยิ้ม คุณร้องไห้</span></button>
  ${nav()}
`,

// PAGE 3 - Q2 ROOF OWNERSHIP / CONDO VS HOUSE
() => `
  <div class="eyebrow">คำถามที่ 2 / 4</div>
  ${meterHTML()}
  <h2>หลังคาเป็นของ<br>ตัวเองมั้ย?</h2>
  <p>การขออนุญาตติดโซลาร์ ผู้ขอต้องมีชื่อเป็นเจ้าของมิเตอร์ไฟฟ้า และมีชื่ออยู่ในทะเบียนบ้าน ส่วนคนที่อยู่คอนโด/อพาร์ตเมนต์ ติดตั้งเองได้ยากมาก</p>
  <button class="btn" onclick="answer('q2',2)">บ้านตัวเอง มีชื่อในทะเบียนบ้านและมิเตอร์<span class="opt-note">มีบังเกอร์ส่วนตัว ปิดประตูรอดคนเดียวได้</span></button>
  <button class="btn" onclick="answer('q2',1)">บ้านของครอบครัว ต้องขอผู้ใหญ่ก่อน<span class="opt-note">รอดได้ แต่ต้องประชุมสภาครอบครัวก่อน</span></button>
  <button class="btn" onclick="answer('q2',0)">อยู่คอนโด/อพาร์ตเมนต์ ไม่มีหลังคาเป็นของตัวเอง<span class="opt-note">ต้องหาบังเกอร์คนอื่นแทน</span></button>
  ${nav()}
`,

// PAGE 4 - Q3 BUDGET
() => `
  <div class="eyebrow">คำถามที่ 3 / 4</div>
  ${meterHTML()}
  <h2>มีเงินสำรอง<br>ยามโลกแตกมั้ย?</h2>
  <p>โซลาร์ขนาด 5-10 kW ใช้เงินลงทุนประมาณ 1-2 แสนบาท (ไม่ต้องถึงขั้นทองคำแท่งสำรองใต้เตียง) ถ้าจะติดแบตเตอรี่ด้วยเพื่อใช้ไฟตอนกลางคืน ต้นทุนจะเพิ่มอีกราว 1.5-2 เท่า</p>
  <button class="btn" onclick="answer('q3',2)">มีเงินก้อนพร้อมจ่าย 1-2 แสนบาท<span class="opt-note">จ่ายสด ไม่ง้อธนาคารซอมบี้</span></button>
  <button class="btn" onclick="answer('q3',1)">พอมี แต่ต้องผ่อนหรือใช้สิทธิ์ลดหย่อนภาษี<span class="opt-note">ต้องวางแผนการเงินหน่อย แต่ยังไปได้</span></button>
  <button class="btn" onclick="answer('q3',0)">เงินสำรองมีไว้ซื้อบะหมี่กึ่งสำเร็จรูปตุนเท่านั้น<span class="opt-note">ยังไม่ใช่เวลาของคุณ (ตอนนี้)</span></button>
  ${nav()}
`,

// PAGE 5 - Q4 PERMIT / INSTALLER / GRID SELL-BACK
() => `
  <div class="eyebrow">คำถามที่ 4 / 4</div>
  ${meterHTML()}
  <h2>มีช่างมาช่วย<br>ติดเกราะมั้ย?</h2>
  <p>ต้องขออนุญาตหน่วยงานรัฐก่อนติดตั้ง และถ้าอยากขายไฟส่วนเกินคืน ตอนนี้รัฐเปิดโควตารับซื้อจากบ้านพักอาศัย ไม่เกิน 5 kW ราคา 2.2 บาท/หน่วย</p>
  <button class="btn" onclick="answer('q4',2)">หาช่างที่ไว้ใจได้แล้ว รู้ขั้นตอนขออนุญาตคร่าว ๆ<span class="opt-note">ทีมสนับสนุนพร้อมรบ</span></button>
  <button class="btn" onclick="answer('q4',1)">ยังไม่มีช่าง แต่พร้อมหาข้อมูล<span class="opt-note">ต้องปวดหัวกับเอกสารอีกสักพัก</span></button>
  <button class="btn" onclick="answer('q4',0)">ไม่รู้จะเริ่มขอใบอนุญาตยังไงเลย<span class="opt-note">ซอมบี้มาไวกว่าเอกสารราชการ</span></button>
  ${nav()}
`,

// PAGE 6 - RESULTS
() => {
  const v = verdict();
  const s = score();
  return `
  <div class="eyebrow">ผลการทดสอบ</div>
  <div class="verdict-badge">${v.sub}</div>
  <h2>${v.title}</h2>
  ${meterHTML()}
  <p>${v.body}</p>
